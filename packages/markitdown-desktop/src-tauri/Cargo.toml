[package]
name = "markitdown-desktop"
version = "0.1.0"
description = "MarkItDown Desktop — convert any file to Markdown for AI"
authors = ["you"]
edition = "2021"

[lib]
name = "markitdown_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
